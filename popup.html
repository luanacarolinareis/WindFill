<!doctype html>
<html lang="en" class="popup-root">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WindFill</title>
    <link rel="icon" type="image/png" href="icons/WindFillFav.png">
    <script src="theme-init.js"></script>
    <style>
      html.popup-root {
        width: 450px;
        min-width: 450px;
        height: 540px;
        min-height: 540px;
        margin: 0;
        overflow: hidden;
      }

      html.popup-root body {
        width: 450px;
        min-width: 450px;
        height: 540px;
        min-height: 540px;
        margin: 0;
        overflow-x: hidden;
        overflow-y: hidden;
      }
    </style>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-shell">
    <div class="popup-scroll">
      <main class="popup-card">
        <section class="popup-header">
          <div class="brand-lockup compact">
            <img class="brand-mark" src="icons/WindFill.png" alt="WindFill logo">
            <div>
              <p class="eyebrow">Offline Chrome extension</p>
              <h1 class="popup-brand-title">
                <span class="popup-brand-wind">Wind</span><span class="popup-brand-fill">Fill</span>
              </h1>
            </div>
          </div>
          <p class="lead page-url" id="pageUrl">Checking current page...</p>
          <div class="theme-control compact">
            <span class="theme-label">Theme</span>
            <label class="theme-switch" for="themeToggle">
              <span class="theme-choice light-choice">Light</span>
              <input id="themeToggle" class="theme-input" type="checkbox" aria-label="Enable dark mode">
              <span class="theme-track"><span class="theme-thumb"></span></span>
              <span class="theme-choice dark-choice">Dark</span>
            </label>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2>Matching profiles</h2>
          </div>
          <div id="profilesPanel" class="profile-list compact"></div>
        </section>

        <section id="statusPanel" class="status-panel">
          <p class="status-label">Waiting for page data...</p>
        </section>

        <section id="diagnosticsPanel" class="diagnostics-panel is-collapsed">
          <div class="section-head">
            <h2>Page diagnostics</h2>
            <button
              id="diagnosticsToggleButton"
              class="button ghost icon-button diagnostics-toggle-button"
              type="button"
              aria-label="Show page diagnostics"
              aria-expanded="false"
              title="Show page diagnostics"
            >
              <span class="sr-only">Toggle page diagnostics</span>
              <svg class="icon-button-mark diagnostics-icon diagnostics-icon-plus" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
              <svg class="icon-button-mark diagnostics-icon diagnostics-icon-minus" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
              </svg>
            </button>
          </div>
          <div class="diagnostics-copy">
            <p class="diagnostics-label">Current URL</p>
            <code id="exactUrl" class="diagnostics-url">Checking current page...</code>
            <p id="diagnosticsText" class="diagnostics-text">Checking saved patterns and page access...</p>
          </div>
        </section>

        <footer class="popup-actions">
          <button id="fillButton" class="button primary" type="button">Fill best match</button>
          <button id="optionsButton" class="button ghost icon-button" type="button" aria-label="Open options" title="Open options">
            <span class="sr-only">Open options</span>
            <svg class="icon-button-mark" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10.3 2.7h3.4l.5 2.3c.5.2 1 .4 1.4.8l2.2-.8 1.7 2.9-1.7 1.6c.1.3.1.7.1 1.1s0 .8-.1 1.1l1.7 1.6-1.7 2.9-2.2-.8c-.4.3-.9.6-1.4.8l-.5 2.3h-3.4l-.5-2.3c-.5-.2-1-.4-1.4-.8l-2.2.8-1.7-2.9 1.7-1.6a4.5 4.5 0 0 1 0-2.2L4.9 7.9 6.6 5l2.2.8c.4-.3.9-.6 1.4-.8l.5-2.3Z"></path>
              <circle cx="12" cy="12" r="3.1"></circle>
            </svg>
          </button>
          <button id="troubleshootingButton" class="button ghost icon-button help-icon-button" type="button" aria-label="Open troubleshooting" title="Open troubleshooting">
            <span class="sr-only">Open troubleshooting</span>
            <span aria-hidden="true">?</span>
          </button>
        </footer>

        <div class="maker-credit popup-credit">
          <p class="maker-credit-line">
            Made by Luana Carolina Reis &hearts;
            <img class="footer-flag footer-flag-image" src="icons/flag-pt.svg" alt="Portugal flag">
          </p>
          <p class="maker-credit-links">
            <a
              class="maker-credit-link"
              href="https://github.com/luanacarolinareis/ControllerLoginAutofill"
              target="_blank"
              rel="noreferrer"
            >
              GitHub
            </a>
            <span class="maker-credit-separator">&bull;</span>
            <a
              class="maker-credit-link"
              href="https://buymeacoffee.com/luanacarolina"
              target="_blank"
              rel="noreferrer"
            >
              Buy Me a Coffee
            </a>
            <span class="maker-credit-separator">&bull;</span>
            <a
              class="maker-credit-link"
              href="https://luanacarolina.me"
              target="_blank"
              rel="noreferrer"
            >
              luanacarolina.me
            </a>
          </p>
        </div>
      </main>
    </div>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
