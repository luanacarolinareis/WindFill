<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controller Login Autofill Options</title>
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-shell">
    <main class="page">
      <section class="hero-card">
        <div>
          <div class="brand-lockup">
            <img class="brand-mark large" src="icons/icon128.png" alt="Controller Login Autofill logo">
            <div>
              <p class="eyebrow">Local only</p>
              <h1>Configure your login profiles</h1>
            </div>
          </div>
          <p class="lead">
            Add the IP or URL pattern for each profile and the extension will autofill username and password fully offline.
          </p>
        </div>
        <div class="hero-note">
          <p><strong>Pattern examples</strong></p>
          <p><code>192.168.1.10</code></p>
          <p><code>10.0.0.*</code></p>
          <p><code>http://192.168.10.20/*</code></p>
        </div>
      </section>

      <section class="toolbar">
        <div id="saveStatus" class="inline-status">Ready.</div>
        <div class="toolbar-actions">
          <div class="theme-control">
            <span class="theme-label">Theme</span>
            <label class="theme-switch" for="themeToggle">
              <span class="theme-choice light-choice">Light</span>
              <input id="themeToggle" class="theme-input" type="checkbox" aria-label="Enable dark mode">
              <span class="theme-track"><span class="theme-thumb"></span></span>
              <span class="theme-choice dark-choice">Dark</span>
            </label>
          </div>
          <button id="seedProfilesButton" class="button ghost" type="button">Reset starter list</button>
          <button id="addProfileButton" class="button ghost" type="button">Add profile</button>
          <button id="toggleViewButton" class="button ghost" type="button">Simple view</button>
          <button id="exportButton" class="button ghost" type="button">Export JSON</button>
          <label class="button ghost file-button" for="importInput">Import JSON</label>
          <input id="importInput" type="file" accept=".json,application/json">
          <button id="saveButton" class="button primary" type="button">Save</button>
        </div>
      </section>

      <section id="profilesList" class="profiles-grid"></section>
    </main>

    <a
      class="floating-help-button"
      href="troubleshooting.html"
      target="_blank"
      rel="noreferrer"
      aria-label="Open troubleshooting"
      title="Troubleshooting"
    >
      ?
    </a>

    <template id="patternRowTemplate">
      <div class="pattern-row">
        <input
          class="pattern-input"
          data-pattern-input
          type="text"
          placeholder="10.*.*.130 or http://192.168.1.130/*"
        >
        <button class="button mini ghost pattern-remove-button" type="button" aria-label="Remove pattern">-</button>
      </div>
    </template>

    <template id="profileTemplate">
      <article class="profile-card">
        <div class="card-header">
          <div>
            <p class="card-index"></p>
            <h2 class="card-title"></h2>
          </div>
          <div class="card-actions">
            <button class="button mini ghost profile-visibility-button" type="button" aria-expanded="true">Collapse</button>
            <button class="button mini danger remove-profile" type="button">Remove</button>
          </div>
        </div>

        <div class="profile-summary">
          <p class="profile-summary-line profile-summary-pattern"></p>
          <p class="profile-summary-line profile-summary-secondary"></p>
          <div class="profile-summary-meta">
            <span class="summary-pill summary-pill-enabled"></span>
            <span class="summary-pill summary-pill-submit"></span>
          </div>
        </div>

        <div class="profile-body">
          <div class="field-grid">
            <label>
              <span>Name</span>
              <input data-field="name" type="text" placeholder="Controller 1">
            </label>

            <label class="pattern-field full-span">
              <span>IP / URL patterns</span>
              <div class="pattern-list" data-pattern-list></div>
              <div class="pattern-actions">
                <button class="button mini ghost pattern-add-button" type="button">+ Add pattern</button>
              </div>
            </label>

            <label>
              <span>Username</span>
              <input data-field="username" type="text" placeholder="admin">
            </label>

            <label class="password-field">
              <span>Password</span>
              <div class="password-input-wrap">
                <input data-field="password" type="password" placeholder="password">
                <button class="password-toggle-button" type="button" aria-label="Show password" aria-pressed="false">
                  <span class="sr-only">Toggle password visibility</span>
                  <svg class="password-toggle-icon icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
                    <circle cx="12" cy="12" r="3.2"></circle>
                  </svg>
                  <svg class="password-toggle-icon icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 5.2A12 12 0 0 1 12 5c6.4 0 10 7 10 7a17.7 17.7 0 0 1-3.2 3.8"></path>
                    <path d="M6.2 6.2A17 17 0 0 0 2 12s3.6 7 10 7a10.7 10.7 0 0 0 4.1-.8"></path>
                    <path d="M9.9 9.9A3 3 0 0 0 9 12a3 3 0 0 0 4.8 2.4"></path>
                  </svg>
                </button>
              </div>
            </label>
          </div>

          <details class="advanced-panel">
            <summary>Advanced selectors</summary>
            <div class="field-grid advanced">
              <label>
                <span>Username selector</span>
                <input data-field="usernameSelector" type="text" placeholder="Optional CSS selector">
              </label>

              <label>
                <span>Password selector</span>
                <input data-field="passwordSelector" type="text" placeholder="Optional CSS selector">
              </label>

              <label>
                <span>Submit selector</span>
                <input data-field="submitSelector" type="text" placeholder="Optional CSS selector">
              </label>
            </div>
          </details>

          <div class="toggle-row">
            <label class="profile-toggle">
              <input data-field="enabled" type="checkbox">
              <span class="profile-toggle-copy">
                <span class="profile-toggle-title">Enabled</span>
                <span class="profile-toggle-help">Allows this profile to match and autofill login pages.</span>
              </span>
              <span class="profile-toggle-ui" aria-hidden="true">
                <span class="profile-toggle-track">
                  <span class="profile-toggle-thumb"></span>
                </span>
              </span>
            </label>

            <label class="profile-toggle">
              <input data-field="overwriteExisting" type="checkbox">
              <span class="profile-toggle-copy">
                <span class="profile-toggle-title">Overwrite existing values</span>
                <span class="profile-toggle-help">Replaces any username or password already present in the fields.</span>
              </span>
              <span class="profile-toggle-ui" aria-hidden="true">
                <span class="profile-toggle-track">
                  <span class="profile-toggle-thumb"></span>
                </span>
              </span>
            </label>

            <label class="profile-toggle">
              <input data-field="autoSubmit" type="checkbox">
              <span class="profile-toggle-copy">
                <span class="profile-toggle-title">Auto submit after fill</span>
                <span class="profile-toggle-help">Clicks the login action automatically after the fields are filled.</span>
              </span>
              <span class="profile-toggle-ui" aria-hidden="true">
                <span class="profile-toggle-track">
                  <span class="profile-toggle-thumb"></span>
                </span>
              </span>
            </label>
          </div>
        </div>
      </article>
    </template>

    <script src="shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
