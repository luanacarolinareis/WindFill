<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autofill Test Page</title>
    <link rel="icon" type="image/png" href="../icons/WindFillFav.png">
    <style>
      :root {
        color-scheme: light;
        --panel: rgba(255, 255, 255, 0.88);
        --ink: #172b38;
        --muted: #607a89;
        --accent-a: #1289e5;
        --accent-b: #72c15e;
        --line: rgba(36, 87, 116, 0.14);
        --success: #1a7c76;
        --field-bg: rgba(255, 255, 255, 0.94);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(18, 137, 229, 0.16), transparent 30%),
          radial-gradient(circle at right, rgba(114, 193, 94, 0.12), transparent 26%),
          linear-gradient(180deg, #f2f7fa 0%, #edf4f8 100%);
      }

      .shell {
        width: min(100%, 440px);
        padding: 28px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 24px 60px rgba(16, 55, 80, 0.16);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 2rem;
      }

      .eyebrow {
        margin-bottom: 10px;
        color: #1289e5;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .lead {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--field-bg);
        font: inherit;
        color: var(--ink);
      }

      button {
        margin-top: 8px;
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-a) 0%, var(--accent-b) 100%);
        color: #f8fdff;
        font: inherit;
        cursor: pointer;
      }

      .status {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: var(--muted);
        line-height: 1.45;
      }

      .status.success {
        color: var(--success);
        border-color: rgba(26, 124, 118, 0.24);
        background: rgba(233, 251, 247, 0.92);
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        background: rgba(18, 137, 229, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">WindFill test page</p>
      <h1>Basic Login Test</h1>
      <p class="lead">
        This page was made to test automatic username/password fill and optional auto-submit.
      </p>

      <form id="loginForm">
        <label>
          <span>Username</span>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="admin">
        </label>

        <label>
          <span>Password</span>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password">
        </label>

        <button id="loginButton" type="submit">Login</button>
      </form>

      <section id="status" class="status">
        Waiting for autofill. If it works, the fields should populate automatically.
      </section>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const username = document.getElementById("username");
      const password = document.getElementById("password");
      const status = document.getElementById("status");

      function updateFieldStatus() {
        const userValue = username.value ? "filled" : "empty";
        const passValue = password.value ? "filled" : "empty";
        status.textContent = "Current fields: username is " + userValue + " and password is " + passValue + ".";
      }

      username.addEventListener("input", updateFieldStatus);
      password.addEventListener("input", updateFieldStatus);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        status.className = "status success";
        status.innerHTML =
          "Submit intercepted. Username: <code>" +
          username.value.replace(/</g, "&lt;") +
          "</code> | Password length: <code>" +
          String(password.value.length) +
          "</code>";
      });
    </script>
  </body>
</html>
